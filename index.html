   PRODUCTION APP — Firestore-backed
   ═══════════════════════════════════════════════════════ */
function TheArchiveProduction() {
  const { items: firestoreItems, loaded, save: fsSave, saveBatch } = useFirestoreItems();
  const { prefs, update: updatePrefs } = useFirestorePrefs();
  
  const uploadToStorage = useUploadToStorage();

  if (!loaded || !prefs) return <div style={{ display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0e0e0e",color:"#777",fontSize:14 }}>Loading data...</div>;
  return <TheArchiveInner 
    initialItems={firestoreItems} 
    fsSave={fsSave} 
    fsSaveBatch={saveBatch}
    initialPrefs={prefs}
    updatePrefs={updatePrefs}
    uploadToStorage={uploadToStorage}
  />;
}

function TheArchiveInner({ initialItems, fsSave, fsSaveBatch, initialPrefs, updatePrefs, uploadToStorage }) {
  // Items come from Firestore via onSnapshot — we mirror them locally for instant UI
  const [items, setItems] = useState(initialItems);
  
  // Sync when Firestore pushes updates (e.g. from another device)
  useEffect(() => { setItems(initialItems); }, [initialItems]);

  const [customTax, setCustomTax] = useState(initialPrefs.customTax);
  const taxonomy = useMemo(() => buildTaxonomy(customTax), [customTax]);

  const [view, setView] = useState("library");
  const [activeDomain, setActiveDomain] = useState(null);
  const [itemId, setItemId] = useState(null);
  const [editItem, setEditItem] = useState(null);
  const [addInit, setAddInit] = useState({});
  const [prevView, setPrevView] = useState("library");

  const [desktop, setDesktop] = useState(typeof window !== "undefined" ? window.innerWidth >= 768 : true);
  const [lastExport, setLastExport] = useState(initialPrefs.lastExport);
  const [streak, setStreak] = useState(() => resolveStreak(initialPrefs.streak));
  const [catModal, setCatModal] = useState(null);
  const [allTags, setAllTags] = useState(initialPrefs.allTags);

  // Persist prefs to Firestore when they change
  useEffect(() => { updatePrefs({ customTax }); }, [customTax]);
  useEffect(() => { updatePrefs({ streak }); }, [streak]);
  useEffect(() => { updatePrefs({ allTags }); }, [allTags]);
  useEffect(() => { if (lastExport) updatePrefs({ lastExport }); }, [lastExport]);
  useEffect(() => { const fn = () => setDesktop(window.innerWidth >= 768); window.addEventListener("resize", fn); return () => window.removeEventListener("resize", fn); }, []);

  // Save individual item to Firestore
  const persistItem = useCallback((item) => { fsSave(item); }, [fsSave]);

  const nav = useCallback((v, a1, a2, a3, a4) => {
    if (v === "library") { setView("library"); setActiveDomain(a1 || null); }
    else if (v === "learned") { setView("learned"); setActiveDomain(a1 || null); }
    else if (v === "vault") { setView("vault"); setActiveDomain(a1 || null); }
    else if (v === "search") { setView("search"); setActiveDomain(null); }
    else if (v === "recent") { setView("recent"); setActiveDomain(null); }
    else if (v === "settings") { setView("settings"); setActiveDomain(null); }
    else if (v === "detail") { setPrevView(view); setView("detail"); setItemId(a1); }
    else if (v === "add") { setPrevView(view); setView("add"); setEditItem(null); setAddInit({ domain: a1 || "", cat: a2 || "", subcat: a3 || "" }); }
    else if (v === "edit") { setView("edit"); setEditItem(a1); }
  }, [view]);

  const handleSave = (saved) => {
    setItems(prev => { const idx = prev.findIndex(i => i.id === saved.id); if (idx >= 0) { const n = [...prev]; n[idx] = saved; return n; } return [...prev, saved]; });
    persistItem(saved);
    if (view === "edit") setView("detail");
    else setView(prevView || "library");
  };
  const handleSynthesis = (id, text) => { 
    const now = new Date().toISOString(); 
    setItems(prev => prev.map(i => { 
      if (i.id !== id) return i;
      const updated = { ...i, synthesis: text, synthesisUpdatedAt: now, updatedAt: now };
      persistItem(updated);
      return updated;
    })); 
  };
  const handleMarkLearned = (id) => {
    const now = new Date().toISOString(); let transitioned = false;
    setItems(prev => prev.map(i => { 
      if (i.id !== id || i.state === STATES.LEARNED) return i; 
      transitioned = true; 
      const updated = { ...i, state: STATES.LEARNED, date_learned: now, updatedAt: now };
      persistItem(updated);
      return updated;
    }));
    if (transitioned) setStreak(prev => recordLearned(resolveStreak(prev)));
  };
  const handleDelete = (id) => { 
    const now = new Date().toISOString(); 
    setItems(prev => prev.map(i => { 
      if (i.id !== id) return i;
      const updated = { ...i, deleted: true, deletedAt: now, updatedAt: now };
      persistItem(updated);
      return updated;
    })); 
    setView(prevView || "library"); 
  };
  const handleExport = () => { const ts = doExport(items); setLastExport(ts); };
  const handleImport = (newItems) => { 
    setItems(prev => [...prev, ...newItems]); 
    fsSaveBatch(newItems);
  };
  const handleBulkMove = (ids, target) => {
    const now = new Date().toISOString();
    const updated = [];
    setItems(prev => prev.map(i => { 
      if (!ids.includes(i.id)) return i;
      const u = { ...i, ...target, updatedAt: now };
      updated.push(u);
      return u;
    }));
    fsSaveBatch(updated);
    setView("library");
  };
  const handleMoveVault = (id) => {
    const now = new Date().toISOString();
    let didLearn = false;
    setItems(prev => prev.map(i => {
      if (i.id !== id) return i;
      const toggled = !i.vault;
      const updated = { ...i, vault: toggled, updatedAt: now };
      if (toggled && i.state !== STATES.LEARNED) { updated.state = STATES.LEARNED; updated.date_learned = i.date_learned || now; didLearn = true; }
      persistItem(updated);
      return updated;
    }));
    if (didLearn) setStreak(prev => recordLearned(resolveStreak(prev)));
  };
  const handleMoveLearned = (id) => { handleMoveVault(id); };
  const handleThreadsChange = (id, newThreads) => {
    const now = new Date().toISOString();
    // Update this item's threads
    setItems(prev => prev.map(i => {
      if (i.id !== id) return i;
      const updated = { ...i, threads: newThreads, updatedAt: now };
      persistItem(updated);
      return updated;
    }));
    // Bidirectional: update all linked items to also reference this id
    const added = newThreads.filter(tid => !(items.find(i => i.id === id)?.threads || []).includes(tid));
    const removed = ((items.find(i => i.id === id)?.threads || [])).filter(tid => !newThreads.includes(tid));
    const toUpdate = [];
    setItems(prev => prev.map(i => {
      if (added.includes(i.id)) {
        const t = [...new Set([...(i.threads || []), id])];
        const updated = { ...i, threads: t, updatedAt: now };
        toUpdate.push(updated);
        return updated;
      }
      if (removed.includes(i.id)) {
        const t = (i.threads || []).filter(tid => tid !== id);
        const updated = { ...i, threads: t, updatedAt: now };
        toUpdate.push(updated);
        return updated;
      }
      return i;
    }));
    if (toUpdate.length > 0) fsSaveBatch(toUpdate);
  };
  const activeItem = items.find(i => i.id === itemId);

  const handleAddTax = (spec) => { setCatModal(spec); };
  const handleConfirmAddTax = (name) => {
    const entry = { id: genId(), ...catModal, name, createdAt: new Date().toISOString() };
    setCustomTax(prev => [...prev, entry]);
    setCatModal(null);
  };
  const handleRemoveTax = (id) => { setCustomTax(prev => prev.filter(c => c.id !== id)); };
  const handleCreateTag = (tag) => { setAllTags(prev => prev.includes(tag) ? prev : [...prev, tag].sort()); };
  const handleRemoveTag = (tag) => { setAllTags(prev => prev.filter(t => t !== tag)); };

  const [renameModal, setRenameModal] = useState(null);
  const handleRenameTax = (spec) => { setRenameModal(spec); };
  const handleConfirmRename = (newName) => {
    const { level: lv, oldName, domain: rDomain, category: rCat } = renameModal;
    const now = new Date().toISOString();
    if (lv === "domain") {
      setCustomTax(prev => {
        let updated = prev.map(c => {
          if (c.type === "domain" && c.name === oldName) return { ...c, name: newName };
          if (c.domain === oldName) return { ...c, domain: newName };
          return c;
        });
        const isDefault = DEFAULT_DOMAINS.some(d => d.name === oldName);
        if (isDefault) updated = [...updated, { id: genId(), type: "rename_domain", from: oldName, to: newName, createdAt: now }];
        return updated;
      });
      const toUpdate = items.filter(i => i.level_2 === oldName).map(i => ({ ...i, level_2: newName, updatedAt: now }));
      setItems(prev => prev.map(i => i.level_2 === oldName ? { ...i, level_2: newName, updatedAt: now } : i));
      if (toUpdate.length > 0) fsSaveBatch(toUpdate);
    } else if (lv === "category") {
      setCustomTax(prev => {
        let updated = prev.map(c => {
          if (c.type === "category" && c.domain === rDomain && c.name === oldName) return { ...c, name: newName };
          if (c.type === "subcategory" && c.domain === rDomain && c.category === oldName) return { ...c, category: newName };
          return c;
        });
        const dDef = DEFAULT_DOMAINS.find(d => d.name === rDomain);
        const isDefault = dDef && dDef.categories.hasOwnProperty(oldName);
        if (isDefault) updated = [...updated, { id: genId(), type: "rename_category", domain: rDomain, from: oldName, to: newName, createdAt: now }];
        return updated;
      });
      const toUpdate = items.filter(i => i.level_2 === rDomain && i.level_3 === oldName).map(i => ({ ...i, level_3: newName, updatedAt: now }));
      setItems(prev => prev.map(i => i.level_2 === rDomain && i.level_3 === oldName ? { ...i, level_3: newName, updatedAt: now } : i));
      if (toUpdate.length > 0) fsSaveBatch(toUpdate);
    } else if (lv === "subcategory") {
      setCustomTax(prev => {
        let updated = prev.map(c => {
          if (c.type === "subcategory" && c.domain === rDomain && c.category === rCat && c.name === oldName) return { ...c, name: newName };
          return c;
        });
        const dDef = DEFAULT_DOMAINS.find(d => d.name === rDomain);
        const isDefault = dDef && dDef.categories[rCat] && dDef.categories[rCat].includes(oldName);
        if (isDefault) updated = [...updated, { id: genId(), type: "rename_subcategory", domain: rDomain, category: rCat, from: oldName, to: newName, createdAt: now }];
        return updated;
      });
      const toUpdate = items.filter(i => i.level_2 === rDomain && i.level_3 === rCat && i.level_4 === oldName).map(i => ({ ...i, level_4: newName, updatedAt: now }));
      setItems(prev => prev.map(i => i.level_2 === rDomain && i.level_3 === rCat && i.level_4 === oldName ? { ...i, level_4: newName, updatedAt: now } : i));
      if (toUpdate.length > 0) fsSaveBatch(toUpdate);
    }
    setRenameModal(null);
  };

  const goBackDetail = () => { setView(prevView || "library"); };

  const isDeep = view === "detail" || view === "edit" || view === "add" || view === "quickadd" || view === "bulkmove";
  const showSidebar = !isDeep;
  const showMobileSidebar = !desktop && showSidebar;
  const sidebarWidth = 220;
  const mobileSidebarWidth = 140;

  const content = () => {
    const compact = showMobileSidebar;
    switch (view) {
      case "library": return <DrillView key="lib" items={items} onNav={nav} onAddTax={handleAddTax} onRenameTax={handleRenameTax} isLearned={false} compact={compact} initDomain={activeDomain} />;
      case "learned": return <DrillView key="lrn" items={items} onNav={nav} onAddTax={handleAddTax} onRenameTax={handleRenameTax} isLearned={true} compact={compact} streak={streak} initDomain={activeDomain} />;
      case "search": return <SearchView items={items} onNav={nav} />;
      case "recent": return <RecentView items={items} onNav={nav} />;
      case "settings": return <SettingsView items={items} onExport={handleExport} onImport={handleImport} onBulkMove={() => setView("bulkmove")} lastExport={lastExport} streak={streak} customTax={customTax} onRemoveCategory={handleRemoveTax} allTags={allTags} onRemoveTag={handleRemoveTag} />;
      case "vault": return <DrillView key="vault" items={items} onNav={nav} onAddTax={handleAddTax} onRenameTax={handleRenameTax} isVault={true} compact={compact} initDomain={activeDomain} />;
      case "bulkmove": return <BulkMoveView items={items} onMove={handleBulkMove} onBack={() => setView("settings")} />;
      case "detail": return activeItem ? <ItemDetail item={activeItem} allItems={items} onBack={goBackDetail} onEdit={() => nav("edit", activeItem)} onDelete={handleDelete} onMoveVault={() => handleMoveVault(activeItem.id)} onMoveLearned={() => handleMoveLearned(activeItem.id)} onSynthesisChange={handleSynthesis} onMarkLearned={handleMarkLearned} onThreadsChange={handleThreadsChange} onNavToItem={(id) => { setPrevView(view); setView("detail"); setItemId(id); }} /> : null;
      case "quickadd": return <QuickAdd onSave={handleSave} onCancel={() => setView(prevView || "library")} />;
      case "add": return <AddEditPage initDomain={addInit.domain} initCat={addInit.cat} initSub={addInit.subcat} onSave={handleSave} onCancel={() => setView(prevView || "library")} allTags={allTags} onCreateTag={handleCreateTag} uploadToStorage={uploadToStorage} />;
      case "edit": return editItem ? <AddEditPage item={editItem} onSave={handleSave} onCancel={() => setView("detail")} allTags={allTags} onCreateTag={handleCreateTag} uploadToStorage={uploadToStorage} /> : null;
      default: return null;
    }
  };

  const modalLabel = catModal ? (catModal.type === "domain" ? `New ${catModal.group} domain` : catModal.type === "category" ? `New category in ${catModal.domain}` : `New subcategory in ${catModal.category}`) : "";

  return (
    <TaxonomyContext.Provider value={taxonomy}>
      {catModal && <AddCategoryModal label={modalLabel} onAdd={handleConfirmAddTax} onCancel={() => setCatModal(null)} />}
      {renameModal && <RenameModal label={renameModal.level === "domain" ? "Rename domain" : renameModal.level === "category" ? "Rename category" : "Rename subcategory"} currentName={renameModal.oldName} onRename={handleConfirmRename} onCancel={() => setRenameModal(null)} />}
      {desktop ? (
        <div style={{ fontFamily: "'Inter',-apple-system,BlinkMacSystemFont,sans-serif", background: BG, color: TEXT, minHeight: "100vh", display: "flex", WebkitFontSmoothing: "antialiased" }}>
          {showSidebar && <Sidebar view={view} activeDomain={activeDomain} onNav={nav} items={items} />}
          <div style={{ marginLeft: showSidebar ? sidebarWidth : 0, flex: 1, padding: "24px 48px", minHeight: "100vh", overflowY: "auto", transition: "margin-left 0.15s ease" }}>{content()}</div>
          {!showSidebar && <BottomNav view={view} onNav={nav} onQuickAdd={() => { setPrevView(view); setView("quickadd"); }} onFullAdd={() => nav("add")} />}
        </div>
      ) : (
        <div style={{ fontFamily: "'Inter',-apple-system,BlinkMacSystemFont,sans-serif", background: BG, color: TEXT, minHeight: "100vh", display: "flex", flexDirection: "column", WebkitFontSmoothing: "antialiased" }}>
          <div style={{ display: "flex", flex: 1, minHeight: 0 }}>
            {showMobileSidebar && <MobileSidebar view={view} activeDomain={activeDomain} onNav={nav} items={items} />}
            <div style={{ flex: 1, padding: showMobileSidebar ? "12px 16px" : "12px 20px", paddingBottom: 72, overflowY: "auto", marginLeft: showMobileSidebar ? mobileSidebarWidth : 0, transition: "margin-left 0.15s ease, padding 0.15s ease" }}>{content()}</div>
          </div>
          <BottomNav view={view} onNav={nav} onQuickAdd={() => { setPrevView(view); setView("quickadd"); }} onFullAdd={() => nav("add")} />
        </div>
      )}
    </TaxonomyContext.Provider>
  );
}

/* ═══════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════ */
function App() {
  return (
    <AuthGate>
      <TheArchiveProduction />
    </AuthGate>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
